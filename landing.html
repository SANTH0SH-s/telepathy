<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telepathy | Initialize</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        .spaced-branding {
            font-family: 'Cinzel', serif;
            letter-spacing: 1.5em;
            text-transform: uppercase;
            font-weight: 800;
            color: var(--accent);
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }
        .progress-bar {
            width: 0%;
            height: 2px;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            transition: width 5s linear;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen overflow-hidden">
    <canvas id="star-canvas"></canvas>

    <div id="intro-content" class="text-center z-10">
        <h1 class="spaced-branding text-5xl md:text-7xl mb-12 opacity-0 transform translate-y-10">TELEPATHY</h1>
        
        <div id="action-zone">
            <button id="initiate-btn" class="btn-primary px-12 py-4 text-xl tracking-widest opacity-0 transform translate-y-5">
                INITIATE SYNC
            </button>
        </div>

        <div id="loading-zone" class="hidden mt-12 w-64 mx-auto">
            <p class="text-xs uppercase tracking-[0.5em] text-accent mb-4 font-bold animate-pulse">Synchronizing Orbitals</p>
            <div class="h-[1px] w-full bg-white/10 rounded-full overflow-hidden">
                <div id="progress" class="progress-bar"></div>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            gsap.to("h1", { opacity: 1, y: 0, duration: 2, ease: "expo.out" });
            gsap.to("#initiate-btn", { opacity: 1, y: 0, duration: 1.5, delay: 0.5, ease: "expo.out" });
        });

        const btn = document.getElementById('initiate-btn');
        const actionZone = document.getElementById('action-zone');
        const loadingZone = document.getElementById('loading-zone');
        const progress = document.getElementById('progress');

        btn.addEventListener('click', () => {
            // Fade out button
            gsap.to(actionZone, { opacity: 0, duration: 0.5, onComplete: () => {
                actionZone.classList.add('hidden');
                loadingZone.classList.remove('hidden');
                gsap.fromTo(loadingZone, { opacity: 0 }, { opacity: 1, duration: 0.5 });
                
                // Start 5s progress
                setTimeout(() => {
                    progress.style.width = '100%';
                }, 10);

                // Redirect after 5s
                setTimeout(() => {
                    gsap.to("body", { opacity: 0, duration: 1, onComplete: () => {
                        window.location.href = 'index.html';
                    }});
                }, 5200);
            }});
        });

        // Background Stars
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        const init = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; stars=[]; for(let i=0; i<200; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, size:Math.random()*1.5, speed:Math.random()*0.4+0.1}); }
        const animate = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = '#D4AF37'; stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill(); s.y += s.speed; if (s.y > canvas.height) s.y = 0; }); requestAnimationFrame(animate); }
        window.addEventListener('resize', init); init(); animate();
    </script>
</body>
</html>
